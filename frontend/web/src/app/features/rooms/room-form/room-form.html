<div mat-dialog-content>
  <mat-card-content>
    <h1>{{ isEdit ? 'Editar Sala' : 'Crear Sala' }}</h1>
    <form [formGroup]="form" (ngSubmit)="submit()" class="login-form">
      <mat-form-field appearance="outline">
        <mat-label>Nombre</mat-label>
        <input matInput formControlName="name" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Capacidad</mat-label>
        <input matInput type="number" formControlName="capacity" placeholder="Capacidad" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Precio/Hora</mat-label>
        <input
          matInput
          type="number"
          formControlName="pricePerHour"
          placeholder="Precio por hora"
        />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Descripción</mat-label>
        <input matInput formControlName="description" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Tipo</mat-label>
        <mat-select formControlName="type">
          <mat-option value="MEETING">Reunión</mat-option>
          <mat-option value="GYM">Gimnasio</mat-option>
          <mat-option value="DINING">Comedor</mat-option>
          <mat-option value="OFFICE">Oficina</mat-option>
        </mat-select>
      </mat-form-field>

    <button mat-button type="button" (click)="close()">Cancelar</button>
      <button mat-flat-button color="primary" type="submit" [disabled]="loading()">
        {{ isEdit ? 'Actualizar' : 'Crear' }}
      </button>
    </form>
  </mat-card-content>
</div>
